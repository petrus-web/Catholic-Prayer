<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖號經 (The Sign of the Cross) - 三語對照</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h2>聖號經 (The Sign of the Cross)</h2>
        <a href="../index.html">← 返回目錄</a>
    </header>

    <main class="comparison-container">
        <section class="lang-column">
            <h3>中文 (Chinese)</h3>
            <div class="content">
                <p>因父，及子，及聖神之名。阿們。</p>
            </div>
        </section>

        <section class="lang-column">
            <h3>英文 (English)</h3>
            <div class="content">
                <p>In the name of the Father, and of the Son, and of the Holy Spirit. Amen.</p>
            </div>
        </section>

        <section class="lang-column">
            <h3>拉丁文 (Latin)</h3>
            <div class="content">
                <p>In nomine Patris, et Filii, et Spiritus Sancti. Amen.</p>
            </div>
        </section>
    </main>
</body>
</html>
